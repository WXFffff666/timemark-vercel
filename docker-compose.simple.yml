# TimeMark 一键部署配置
# 适用于飞牛OS、群晖NAS、威联通、铁威马等NAS环境
# 单容器：SQLite 内置数据库

services:
  app:
    image: ghcr.io/wfffff666/timemark:latest
    container_name: timemark-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DB_PATH: /app/data/timemark.db
      TZ: Asia/Shanghai
      # 生产环境建议修改密钥
      # JWT_SECRET: 你的JWT密钥
      # MASTER_KEY: 你的主密钥
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      # 数据持久化目录 - 修改左边路径为你的NAS实际文件夹
      - ./data:/app/data
    networks:
      - timemark

networks:
  timemark:
    driver: bridge