<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>注册管理员</title>
  <style>
    body { font-family: Arial; max-width: 400px; margin: 50px auto; padding: 20px; }
    input { width: 100%; padding: 10px; margin: 10px 0; }
    button { width: 100%; padding: 10px; background: #0066cc; color: white; border: none; cursor: pointer; }
  </style>
</head>
<body>
  <h2>创建管理员账户</h2>
  <input type="text" id="username" placeholder="用户名" value="admin">
  <input type="password" id="password" placeholder="密码">
  <button onclick="register()">创建账户</button>
  <div id="result"></div>
  
  <script src="https://cdn.jsdelivr.net/npm/argon2-browser@1.18.0/dist/argon2-bundled.min.js"></script>
  <script>
    async function register() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      
      document.getElementById('result').innerHTML = '生成密码哈希...';
      
      const salt = new Uint8Array(16);
      crypto.getRandomValues(salt);
      
      const result = await argon2.hash({
        pass: password,
        salt: salt,
        time: 3,
        mem: 65536,
        hashLen: 32,
        parallelism: 4,
        type: argon2.ArgonType.Argon2id
      });
      
      document.getElementById('result').innerHTML = `
        <h3>复制以下命令到终端执行:</h3>
        <textarea style="width:100%;height:100px;">wrangler d1 execute timemark-db --remote --command="INSERT INTO users (id, username, password_hash, created_at) VALUES ('admin-001', '${username}', '${result.encoded}', datetime('now'))"</textarea>
      `;
    }
  </script>
</body>
</html>
