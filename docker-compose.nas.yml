# TimeMark 群晖NAS/威联通/铁威马 一键部署
# 适用于：群晖DSM、威联通QTS、铁威马TOS
# 单容器部署：SQLite 内置数据库
# 使用方法：
#   1. 在NAS Docker应用中创建"自由"网络
#   2. 创建数据存储文件夹（如 /timemark/data）
#   3. 复制下方配置到"docker-compose.yml"
#   4. 按需修改端口和数据路径后部署

# ⚠️ 重要：首次部署前请修改管理员密码和密钥！

services:
  timemark-app:
    image: ghcr.io/wfffff666/timemark:latest
    container_name: timemark-app
    restart: unless-stopped
    # 端口映射 - 如被占用可修改左边端口号
    ports:
      - "3000:3000"
    environment:
      # SQLite: 数据存储位置（容器内）
      DB_PATH: /app/data/timemark.db
      # 管理员凭证（⚠️ 建议修改密码）
      DEFAULT_ADMIN_USERNAME: admin
      DEFAULT_ADMIN_PASSWORD: YourSecurePassword123
      # 时区
      TZ: Asia/Shanghai
      # 环境
      NODE_ENV: production
      # 生产环境建议修改密钥
      # JWT_SECRET: 你的JWT密钥（至少32位随机字符串）
      # MASTER_KEY: 你的主密钥（至少32位随机字符串）
    volumes:
      # 数据持久化目录 - 修改左边路径为你的NAS实际文件夹
      - /volume1/docker/timemark/data:/app/data
    networks:
      - timemark-network

networks:
  timemark-network:
    name: timemark-network
    driver: bridge