# TimeMark NAS 一键部署（群晖/威联通/铁威马）
# 默认账号: admin / TimeMark@2026（登录后请修改密码）
# ⬇️ 只需修改 volumes 路径为你的NAS实际文件夹
#   群晖: /volume1/docker/timemark/data
#   威联通: /share/Container/timemark/data
#   铁威马: /mnt/user/docker/timemark/data

services:
  timemark-app:
    image: xfffff666/timemark:latest
    container_name: timemark-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      TZ: Asia/Shanghai
    dns:
      - 223.5.5.5
      - 119.29.29.29
    volumes:
      - /volume1/docker/timemark/data:/app/data