name: Build and Push Docker Image

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

# 需要设置仓库的可见性为公开才能推送镜像
# 在 GitHub 仓库设置中将 Package registry 设为公开

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository.owner }}/timemark
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{ is_default_branch }}
            type=raw,value=${{ github.ref_name }},prefix=v

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ meta.outputs.tags }}
          labels: ${{ meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output Image URL
        run: |
          echo "Docker Image: ${{ meta.outputs.tags }}"
          echo "image_url=${{ meta.outputs.tags }}" >> $GITHUB_OUTPUT