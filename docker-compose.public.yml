# TimeMark 公开镜像部署配置
# 使用方法: docker-compose -f docker-compose.public.yml up -d
# 访问地址: http://localhost:3000
# 默认账号: 由 DEFAULT_ADMIN_USERNAME / DEFAULT_ADMIN_PASSWORD 环境变量设置
# 单容器：SQLite 内置数据库

services:
  app:
    image: ghcr.io/wfffff666/timemark:latest
    container_name: timemark-app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DB_PATH: /app/data/timemark.db
      TZ: Asia/Shanghai
      # ⚠️ 生产环境必须设置密钥！运行 openssl rand -hex 32 生成
      # JWT_SECRET: 你的JWT密钥（至少32位随机字符串）
      # MASTER_KEY: 你的主密钥（至少32位随机字符串）
    volumes:
      - ./data:/app/data
    networks:
      - timemark

networks:
  timemark:
    driver: bridge