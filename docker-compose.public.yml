services:
  app:
    image: xfffff666/timemark:latest
    container_name: timemark-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      TZ: Asia/Shanghai
    dns:
      - 223.5.5.5
      - 8.8.8.8
    volumes:
      - ./data:/app/data