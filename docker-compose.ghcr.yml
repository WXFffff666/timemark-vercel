# TimeMark Docker Compose 配置 (GHCR)
# 即开即用：拉取后直接 docker compose up -d 即可使用
# 默认账号: admin / TimeMark@2026（登录后请立即修改密码）

services:
  app:
    image: ghcr.io/wfffff666/timemark:latest
    container_name: timemark-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      TZ: Asia/Shanghai
    volumes:
      - ./data:/app/data
    networks:
      - timemark

networks:
  timemark:
    driver: bridge