# TimeMark 一键部署 (GHCR - 需要 GitHub 登录)
# 默认账号: admin / TimeMark@2026（登录后请修改密码）
# 国内用户推荐使用 docker-compose.dockerhub.yml

services:
  app:
    image: ghcr.io/wfffff666/timemark:latest
    container_name: timemark-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      TZ: Asia/Shanghai
    dns:
      - 223.5.5.5
      - 119.29.29.29
    volumes:
      - ./data:/app/data