# TimeMark 完整一键部署（公网服务器/云服务器）
# 单容器部署：SQLite 内置数据库
# 特点：数据持久化完整配置，自动备份配置

# ⚠️ 重要：首次部署前请修改以下环境变量！
# - DEFAULT_ADMIN_USERNAME: 管理员用户名
# - DEFAULT_ADMIN_PASSWORD: 管理员密码（请使用强密码，至少8位）
# - JWT_SECRET: JWT签名密钥（请使用随机字符串，至少32位）
# - MASTER_KEY: 主密钥（用于敏感数据加密，请使用随机字符串）

services:
  app:
    image: ghcr.io/wfffff666/timemark:latest
    container_name: timemark-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # SQLite: 数据存储位置（容器内）
      DB_PATH: /app/data/timemark.db
      # 管理员凭证（⚠️ 必须修改）
      DEFAULT_ADMIN_USERNAME: admin
      DEFAULT_ADMIN_PASSWORD: YourSecurePassword123
      # 时区
      TZ: Asia/Shanghai
      # 环境
      NODE_ENV: production
      # JWT 密钥（⚠️ 务必修改为随机字符串）
      JWT_SECRET: ${JWT_SECRET:-your-secure-jwt-secret-min-32-chars}
      # 主密钥（⚠️ 务必修改为随机字符串）
      MASTER_KEY: ${MASTER_KEY:-your-secure-master-key-min-32}
    volumes:
      # 数据持久化目录（包含 SQLite 数据库和上传文件）
      - ./data:/app/data
      # 配置目录（备份恢复用）
      - ./config:/app/config
    networks:
      - timemark
    deploy:
      resources:
        limits:
          memory: 512M
    labels:
      - "traefik.enable=true"
      # 如需配置HTTPS反向代理，取消注释
      # - "traefik.http.routers.timemark.rule=Host(`your-domain.com`)"
      # - "traefik.http.routers.timemark.tls=true"

networks:
  timemark:
    driver: bridge