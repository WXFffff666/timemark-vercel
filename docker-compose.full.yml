# TimeMark 公网服务器部署
# 默认账号: admin / TimeMark@2026（登录后请修改密码）
# 公网部署建议自定义密钥（可选，不设置也能用）

services:
  app:
    image: xfffff666/timemark:latest
    container_name: timemark-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      TZ: Asia/Shanghai
      # 公网部署建议设置（可选）
      # JWT_SECRET: 你的自定义JWT密钥
      # MASTER_KEY: 你的自定义加密密钥
    dns:
      - 223.5.5.5
      - 8.8.8.8
    volumes:
      - ./data:/app/data
    deploy:
      resources:
        limits:
          memory: 512M