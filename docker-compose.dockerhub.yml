# TimeMark 一键部署 (Docker Hub)
# 默认账号: admin / TimeMark@2026（登录后请修改密码）
# 使用: docker compose up -d

services:
  app:
    image: xfffff666/timemark:latest
    container_name: timemark-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      TZ: Asia/Shanghai
    dns:
      - 223.5.5.5
      - 8.8.8.8
    volumes:
      - ./data:/app/data