# TimeMark 开发/本地部署配置
# 单容器：SQLite 内置数据库

services:
  app:
    build: .
    container_name: timemark-app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DB_PATH: /app/data/timemark.db
      MASTER_KEY: ${MASTER_KEY}
      JWT_SECRET: ${JWT_SECRET:-CHANGE_ME_USE_openssl_rand_hex_32}
      TZ: Asia/Shanghai
    volumes:
      - ./data:/app/data
    networks:
      - timemark
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 512M

networks:
  timemark:
    driver: bridge