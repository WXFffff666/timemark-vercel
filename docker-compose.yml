# TimeMark 本地开发配置
# 默认账号: admin / TimeMark@2026

services:
  app:
    build: .
    container_name: timemark-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      TZ: Asia/Shanghai
    dns:
      - 223.5.5.5
      - 8.8.8.8
    volumes:
      - ./data:/app/data

networks:
  timemark:
    driver: bridge